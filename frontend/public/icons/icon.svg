<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d5a3d"/>
      <stop offset="100%" style="stop-color:#1a472a"/>
    </linearGradient>
    <linearGradient id="tile" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fffff5"/>
      <stop offset="100%" style="stop-color:#f5f0e0"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Tile body -->
  <rect x="136" y="96" width="240" height="320" rx="24" fill="url(#tile)" filter="url(#shadow)" stroke="#d4c8a0" stroke-width="2"/>
  <!-- Tile inner border -->
  <rect x="148" y="108" width="216" height="296" rx="16" fill="none" stroke="#e8e0c8" stroke-width="1"/>
  <!-- Character 万 -->
  <text x="256" y="260" text-anchor="middle" font-size="140" font-family="serif" font-weight="bold" fill="#c0392b">万</text>
  <!-- Small decorative characters -->
  <text x="256" y="380" text-anchor="middle" font-size="36" font-family="serif" fill="#7f8c8d" letter-spacing="16">东南西北</text>
</svg>
